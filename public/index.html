<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <meta name="theme-color" content="#0F1D35" />
    <meta name="description" content="Swasthya — Your health records, always with you" />

    <!-- PWA -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/icon-192.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Mukta:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

    <title>Swasthya</title>

    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: #1a1a2e;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        min-height: 100vh;
        font-family: 'Mukta', sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      #root {
        width: 100%;
        max-width: 430px;
        min-height: 100vh;
      }
      /* On desktop, show phone frame */
      @media (min-width: 500px) {
        body { align-items: center; padding: 20px 0; }
        #root {
          min-height: auto;
          height: 844px;
          border-radius: 44px;
          overflow: hidden;
          box-shadow: 0 40px 120px rgba(0,0,0,0.6);
        }
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
